name: "🐛 버그 리포트"
description: "명확한 버그나 오류를 발견하셨나요? 상세하게 알려주세요."
title: "[BUG] "
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        ## SmartMCC 버그 리포트
        발견하신 버그를 상세히 기록해주세요. 이미지는 드래그 앤 드롭으로 첨부 가능합니다.

  - type: dropdown
    id: category
    attributes:
      label: "📂 버그 카테고리"
      description: "버그가 발생한 영역을 선택해주세요. (복수 선택 가능)"
      multiple: true
      options:
        - "🖥️ UI (사용자 인터페이스)"
        - "⚙️ 기능 (기능 오류 / 동작 이상)"
        - "🔗 Omniverse 연동"
        - "🤖 Robot 연동"
        - "📊 데이터 / 설정 / 저장"
        - "🚀 성능 (속도 / 메모리)"
        - "💥 크래시 / 앱 종료"
        - "📋 기타"
    validations:
      required: true

  - type: dropdown
    id: severity
    attributes:
      label: "🔥 심각도"
      options:
        - "🔴 긴급 (서비스 사용 불가 / 크래시)"
        - "🟠 높음 (주요 기능 사용 불가)"
        - "🟡 보통 (일부 기능 영향)"
        - "🟢 낮음 (미미한 영향)"
    validations:
      required: true

  - type: textarea
    id: description
    attributes:
      label: "📝 버그 설명"
      description: "발생한 버그를 명확하게 설명해주세요."
      placeholder: "어떤 버그가 발생했는지 설명해주세요."
    validations:
      required: true

  - type: textarea
    id: steps
    attributes:
      label: "🔁 재현 방법"
      description: "버그를 재현할 수 있는 단계를 작성해주세요."
      placeholder: |
        1. '...' 화면으로 이동
        2. '...' 클릭
        3. 버그 발생
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: "✅ 기대 동작"
      description: "정상적으로 동작해야 하는 방식을 설명해주세요."
      placeholder: "정상이라면 어떻게 동작해야 하나요?"
    validations:
      required: true

  - type: textarea
    id: actual
    attributes:
      label: "❌ 실제 동작"
      description: "실제로 어떻게 잘못 동작했는지 설명해주세요."
      placeholder: "실제로는 어떻게 동작했나요?"
    validations:
      required: true

  - type: textarea
    id: screenshots
    attributes:
      label: "📸 오류 화면 / 로그"
      description: |
        오류 화면 캡처 이미지를 이 영역에 드래그 앤 드롭하거나 Ctrl+V로 붙여넣기 하세요.
        로그가 있다면 코드 블록(```)으로 감싸서 붙여넣어 주세요.
      placeholder: "[ 이미지를 여기에 드래그 앤 드롭 ]"
    validations:
      required: false

  - type: input
    id: version
    attributes:
      label: "🏷️ SmartMCC 버전"
      placeholder: "예: v1.0.0_20260614"
    validations:
      required: false

  - type: textarea
    id: environment
    attributes:
      label: "🖥️ 환경 정보"
      placeholder: |
        - 운영체제 (OS):
        - Omniverse 버전 (해당 시):
        - 기타 관련 정보:
    validations:
      required: false

  - type: checkboxes
    id: confirm
    attributes:
      label: "✅ 제출 확인"
      options:
        - label: "동일한 버그가 이미 등록되어 있지 않음을 확인했습니다."
          required: true
