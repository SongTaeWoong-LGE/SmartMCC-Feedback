name: Sync Feedback Issues to SmartMCC-V2

on:
  issues:
    types:
      - opened
      - edited
      - closed
      - reopened

jobs:
  sync-issue:
    runs-on: ubuntu-latest
    permissions:
      issues: read

    env:
      TARGET_OWNER: SongTaeWoong-LGE
      TARGET_REPO: SmartMCC-V2
      SYNC_TOKEN: ${{ secrets.SMARTMCC_SYNC_TOKEN }}
      ISSUE_NUMBER: ${{ github.event.issue.number }}
      ISSUE_TITLE: ${{ github.event.issue.title }}
      ISSUE_BODY: ${{ github.event.issue.body }}
      ISSUE_ACTION: ${{ github.event.action }}
      ISSUE_AUTHOR: ${{ github.event.issue.user.login }}
      SOURCE_REPO: ${{ github.repository }}

    steps:
      - name: Sync issue to SmartMCC-V2
        run: |
          set -e

          SOURCE_LINK="https://github.com/${SOURCE_REPO}/issues/${ISSUE_NUMBER}"
          SYNC_BADGE="$(printf '\n\n---\n> 📥 **이 이슈는 [SmartMCC-Feedback #%s](%s)에서 자동 동기화되었습니다.**\n> 원본 등록자: @%s' "$ISSUE_NUMBER" "$SOURCE_LINK" "$ISSUE_AUTHOR")"
          FULL_BODY="${ISSUE_BODY}${SYNC_BADGE}"

          # 이미 동기화된 이슈 검색
          MARKER="SmartMCC-Feedback #${ISSUE_NUMBER}"
          ENCODED_MARKER=$(python3 -c "import urllib.parse, sys; print(urllib.parse.quote(sys.argv[1]))" "$MARKER")
          SEARCH_RESULT=$(curl -sf \
            -H "Authorization: Bearer ${SYNC_TOKEN}" \
            -H "Accept: application/vnd.github+json" \
            -H "X-GitHub-Api-Version: 2022-11-28" \
            "https://api.github.com/search/issues?q=repo:${TARGET_OWNER}/${TARGET_REPO}+is:issue+in:body+${ENCODED_MARKER}")

          EXISTING_NUMBER=$(echo "$SEARCH_RESULT" | jq -r \
            --arg marker "$MARKER" \
            '[.items[] | select(.body != null and (.body | contains($marker))) | .number] | first // empty')

          if [ "$ISSUE_ACTION" = "opened" ]; then
            PAYLOAD=$(jq -n \
              --arg title "[Feedback] ${ISSUE_TITLE}" \
              --arg body "$FULL_BODY" \
              '{"title": $title, "body": $body, "labels": ["feedback"]}')

            RESPONSE=$(curl -s -w "\n%{http_code}" \
              -X POST \
              -H "Authorization: Bearer ${SYNC_TOKEN}" \
              -H "Accept: application/vnd.github+json" \
              -H "X-GitHub-Api-Version: 2022-11-28" \
              -H "Content-Type: application/json" \
              -d "$PAYLOAD" \
              "https://api.github.com/repos/${TARGET_OWNER}/${TARGET_REPO}/issues")

            HTTP_CODE=$(echo "$RESPONSE" | tail -1)
            echo "$RESPONSE" | head -1 | jq -r '"✅ Issue 생성 완료: " + .html_url'
            [ "$HTTP_CODE" = "201" ] || { echo "❌ 생성 실패 (HTTP $HTTP_CODE)"; exit 1; }

          elif [ -n "$EXISTING_NUMBER" ]; then
            if [ "$ISSUE_ACTION" = "edited" ]; then
              PAYLOAD=$(jq -n \
                --arg title "[Feedback] ${ISSUE_TITLE}" \
                --arg body "$FULL_BODY" \
                '{"title": $title, "body": $body}')

              curl -sf \
                -X PATCH \
                -H "Authorization: Bearer ${SYNC_TOKEN}" \
                -H "Accept: application/vnd.github+json" \
                -H "X-GitHub-Api-Version: 2022-11-28" \
                -H "Content-Type: application/json" \
                -d "$PAYLOAD" \
                "https://api.github.com/repos/${TARGET_OWNER}/${TARGET_REPO}/issues/${EXISTING_NUMBER}" > /dev/null
              echo "✅ Issue #${EXISTING_NUMBER} 수정 완료"

            elif [ "$ISSUE_ACTION" = "closed" ]; then
              curl -sf \
                -X PATCH \
                -H "Authorization: Bearer ${SYNC_TOKEN}" \
                -H "Accept: application/vnd.github+json" \
                -H "X-GitHub-Api-Version: 2022-11-28" \
                -H "Content-Type: application/json" \
                -d '{"state": "closed"}' \
                "https://api.github.com/repos/${TARGET_OWNER}/${TARGET_REPO}/issues/${EXISTING_NUMBER}" > /dev/null
              echo "✅ Issue #${EXISTING_NUMBER} 닫기 완료"

            elif [ "$ISSUE_ACTION" = "reopened" ]; then
              curl -sf \
                -X PATCH \
                -H "Authorization: Bearer ${SYNC_TOKEN}" \
                -H "Accept: application/vnd.github+json" \
                -H "X-GitHub-Api-Version: 2022-11-28" \
                -H "Content-Type: application/json" \
                -d '{"state": "open"}' \
                "https://api.github.com/repos/${TARGET_OWNER}/${TARGET_REPO}/issues/${EXISTING_NUMBER}" > /dev/null
              echo "✅ Issue #${EXISTING_NUMBER} 다시 열기 완료"
            fi

          else
            echo "⚠️ action '${ISSUE_ACTION}'에 해당하는 기존 이슈를 ${TARGET_OWNER}/${TARGET_REPO}에서 찾지 못함"
          fi
